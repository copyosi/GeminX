<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MiniX — live critique</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <style>
    /* ═══════════════════════════════════════════════════════════════
       MINI — a live visual-critique instrument.
       Gallery black. The work is the only exhibit. One accent: the
       critique red — an editor's pen, never decoration.
       Committed single visual world (dark). Deliberate, not an omission.
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --ground:      #0A0A0C;   /* gallery near-black, faintly cool-warm */
      --ground-mat:  #060607;   /* the mat around the exhibit */
      --ink:         #F4F2EE;   /* warm off-white */
      --ink-soft:    #B8B6B0;   /* secondary text */
      --zinc:        #6E6E76;   /* meta / labels */
      --zinc-dim:    #45454C;   /* dim labels */
      --hair:        #232329;   /* hairlines */
      --red:         #FF362B;   /* critique red — the pen */
      --red-ink:     #C81E12;   /* label fill */
      --red-glow:    rgba(255, 54, 43, 0.35);

      --serif: ui-serif, "New York", Georgia, "Times New Roman", serif;
      --sans:  -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
      --mono:  ui-monospace, "SF Mono", "Menlo", "Roboto Mono", monospace;

      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --safe-r: env(safe-area-inset-right, 0px);

      --edge: 22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--ground-mat);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
    }

    ::selection { background: var(--red); color: #fff; }

    button {
      font: inherit; color: inherit; background: none; border: none;
      cursor: pointer; -webkit-appearance: none;
    }
    button:focus-visible { outline: 2px solid var(--red); outline-offset: 3px; }

    /* ── Stage: the exhibit, matted in black ─────────────────────── */
    #stage {
      position: fixed; inset: 0;
      background: var(--ground-mat);
      display: grid; place-items: center;
      overflow: hidden;
    }

    /* uploaded work — replaces the camera as the exhibit */
    #upload-img {
      position: absolute; inset: 0; z-index: 2;
      width: 100%; height: 100%;
      object-fit: contain;
      background: var(--ground-mat);
      display: none;
    }
    body.uploaded #upload-img { display: block; }
    body.uploaded #video { visibility: hidden; }

    /* Split layout for uploaded work — the visual stops owning the screen
       (Yosef 22.7). Landscape: work left, her space right. Portrait: work
       top, her space below. Camera mode is untouched. */
    @media (orientation: landscape) {
      body.uploaded #upload-img { width: 62%; border-right: 1px solid var(--hair); }
      body.uploaded #verdict {
        right: calc(var(--safe-r) + var(--edge)); left: auto;
        bottom: auto; top: calc(var(--safe-t) + 96px);
      }
      body.uploaded #subtitles {
        left: 64%; right: calc(var(--safe-r) + var(--edge));
        width: auto; transform: none;
        bottom: calc(var(--safe-b) + 120px);
        text-align: right;
      }
    }
    @media (orientation: portrait) {
      body.uploaded #upload-img { height: 60%; border-bottom: 1px solid var(--hair); }
      body.uploaded #subtitles { bottom: calc(var(--safe-b) + 150px); }
      body.uploaded #verdict { bottom: calc(var(--safe-b) + 240px); }
    }

    /* soft gallery vignette — grounds the mat, no decoration */
    #stage::after {
      content: ""; position: absolute; inset: 0; z-index: 4;
      pointer-events: none;
      background: radial-gradient(130% 120% at 50% 44%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }

    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;              /* whole work shown — a matted print */
      background: var(--ground-mat);
      filter: saturate(0.96) brightness(0.94) contrast(1.02);
      transition: filter 900ms cubic-bezier(.22,.61,.36,1);
      z-index: 1;
    }
    /* developing pass during a scan */
    body.state-scanning #video { filter: saturate(0.35) brightness(0.82) contrast(1.06); }

    /* ── Critique marks layer (positioned to the video content rect) ── */
    #marks {
      position: absolute; z-index: 6; pointer-events: none;
      /* left/top/width/height set in JS to match the letterboxed video */
    }

    /* ── Scan ring: the only theatrical element ──────────────────── */
    #ring {
      position: absolute; z-index: 5;
      left: 50%; top: 50%;
      width: min(58vmin, 460px); aspect-ratio: 1;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      transition: opacity 700ms ease, transform 900ms cubic-bezier(.22,.61,.36,1);
      pointer-events: none;
    }
    body.state-scanning #ring,
    body.state-live #ring { opacity: 1; }
    body.state-scanning #ring { animation: lockon 1600ms cubic-bezier(.22,.61,.36,1) both; }
    @keyframes lockon {
      0%   { transform: translate(-50%,-50%) scale(1.35); opacity: 0; }
      35%  { opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    }
    #ring .ring-rot { position: absolute; inset: 0; animation: spin 14s linear infinite; }
    body.reduced #ring .ring-rot { animation: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ring svg { width: 100%; height: 100%; display: block; overflow: visible; }
    .ring-track { fill: none; stroke: rgba(244,242,238,0.14); stroke-width: 1; }
    .ring-ticks { stroke: rgba(244,242,238,0.28); stroke-width: 1; }
    .ring-sweep {
      fill: none; stroke: var(--red); stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 60 244; stroke-dashoffset: 0;
      filter: drop-shadow(0 0 4px var(--red-glow));
      animation: sweep 3.2s linear infinite;
    }
    body.reduced .ring-sweep { animation: none; stroke-dasharray: 304; }
    @keyframes sweep { to { stroke-dashoffset: -304; } }

    /* viewfinder brackets */
    .bracket { position: absolute; width: 20px; height: 20px; border: 1.5px solid rgba(244,242,238,0.4); }
    .bk-tl { left: -8px; top: -8px; border-right: none; border-bottom: none; }
    .bk-tr { right: -8px; top: -8px; border-left: none; border-bottom: none; }
    .bk-bl { left: -8px; bottom: -8px; border-right: none; border-top: none; }
    .bk-br { right: -8px; bottom: -8px; border-left: none; border-top: none; }

    /* ── Exhibit placard (top-left) ──────────────────────────────── */
    #placard {
      position: fixed; z-index: 20;
      top: calc(var(--safe-t) + var(--edge));
      left: calc(var(--safe-l) + var(--edge));
      display: flex; flex-direction: column; gap: 4px;
      pointer-events: none;
    }
    .wordmark {
      font-family: var(--serif);
      font-size: 30px; font-weight: 500; font-style: italic;
      letter-spacing: 0.01em; line-height: 1;
      color: var(--ink);
    }
    .medium {
      font-family: var(--mono);
      font-size: 10.5px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--zinc);
    }

    /* ── Status (top-right) ──────────────────────────────────────── */
    #status {
      position: fixed; z-index: 20;
      top: calc(var(--safe-t) + var(--edge));
      right: calc(var(--safe-r) + var(--edge));
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono);
      font-size: 10.5px; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--zinc);
    }
    #live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--zinc-dim);
      transition: background 300ms ease, box-shadow 300ms ease;
    }
    body.mic-live #live-dot {
      background: var(--red);
      box-shadow: 0 0 0 0 var(--red-glow);
      animation: pulse 1.9s ease-out infinite;
    }
    body.reduced #live-dot { animation: none; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 var(--red-glow); }
      70%  { box-shadow: 0 0 0 8px rgba(255,54,43,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,54,43,0); }
    }

    /* ── Verdict: score + worst area (gallery placard, appears on scan) ── */
    #verdict {
      position: fixed; z-index: 18;
      right: calc(var(--safe-r) + var(--edge));
      bottom: calc(var(--safe-b) + 120px);
      text-align: right;
      opacity: 0; transform: translateY(8px);
      transition: opacity 600ms ease, transform 600ms ease;
      pointer-events: none;
    }
    body.has-verdict #verdict { opacity: 1; transform: none; }
    .score {
      font-family: var(--serif); font-weight: 500;
      font-size: 58px; line-height: 0.85; color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .score .over { color: var(--zinc); font-size: 26px; }
    #worst {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--red);
      margin-top: 8px;
    }

    /* ── Mode picker ─────────────────────────────────────────────── */
    #modes {
      position: fixed; z-index: 22;
      left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 92px);
      display: flex; gap: 4px;
      padding: 4px; border: 1px solid var(--hair); border-radius: 2px;
      background: rgba(10,10,12,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: opacity 400ms ease;
    }
    #modes button {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--zinc);
      padding: 8px 15px; border-radius: 1px;
      min-height: 34px;
      transition: color 200ms ease, background 200ms ease;
    }
    #modes button[aria-pressed="true"] { color: var(--ink); background: rgba(244,242,238,0.07); }
    #modes button:active { color: var(--ink); }
    /* mode picker recedes once the critique is live */
    body.state-live #modes, body.state-rebuilding #modes, body.state-reveal #modes { opacity: 0; pointer-events: none; }

    /* ── Subtitles: cinematic, bottom, max 2 lines ───────────────── */
    #subtitles {
      position: fixed; z-index: 19;
      left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 92px);
      width: min(760px, 88vw);
      text-align: center;
      opacity: 0; transition: opacity 320ms ease;
    }
    #subtitles.visible { opacity: 1; }
    #subtitle-text {
      display: inline; /* so the ink-box hugs the text */
      font-family: var(--sans);
      font-size: clamp(18px, 2.5vmin, 24px);
      font-weight: 550; line-height: 1.42;
      color: #fff;
      background: rgba(6,6,7,0.62);
      box-decoration-break: clone; -webkit-box-decoration-break: clone;
      padding: 3px 10px;
      text-shadow: 0 1px 10px rgba(0,0,0,0.9);
      /* clamp to 2 lines */
      -webkit-line-clamp: 2; line-clamp: 2;
    }
    #subtitles[dir="rtl"] #subtitle-text { direction: rtl; }

    /* ── Actions ─────────────────────────────────────────────────── */
    #actions {
      position: fixed; z-index: 22;
      left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 26px);
      display: flex; gap: 12px; align-items: center;
    }
    .btn {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
      text-transform: uppercase;
      min-height: 48px; padding: 0 30px;
      display: inline-flex; align-items: center; gap: 10px;
      border: 1px solid var(--ink); color: var(--ink);
      border-radius: 2px;
      background: rgba(10,10,12,0.4);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background 200ms ease, color 200ms ease, border-color 200ms ease, opacity 300ms ease;
    }
    .btn:active { background: var(--ink); color: var(--ground); }
    .btn-primary { border-color: var(--red); color: var(--ink); }
    .btn-primary::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 8px var(--red-glow);
    }
    .btn-primary:active { background: var(--red); color: #fff; }
    .btn-ghost { border-color: var(--hair); color: var(--zinc); }
    .btn[hidden] { display: none; }

    /* ── Before / After reveal — full-bleed, minimal handle ──────── */
    #reveal {
      position: fixed; inset: 0; z-index: 30;
      background: var(--ground-mat);
      display: none; place-items: center;
    }
    #reveal.on { display: grid; }
    .rv-pane { position: absolute; inset: 0; display: grid; place-items: center; }
    .rv-pane img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #rv-before { clip-path: inset(0 calc(100% - var(--pos, 50%)) 0 0); z-index: 2; }
    #rv-after  { z-index: 1; }
    #rv-handle {
      position: absolute; z-index: 3; top: 0; bottom: 0;
      left: var(--pos, 50%); width: 2px; margin-left: -1px;
      background: var(--ink);
      touch-action: none;
    }
    #rv-handle::after {
      content: ""; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid var(--ink); background: rgba(6,6,7,0.5);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    #rv-handle::before {
      content: "‹ ›"; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 1;
      font: 13px var(--mono); letter-spacing: 2px; color: var(--ink);
    }
    .rv-label {
      position: absolute; z-index: 4; bottom: calc(var(--safe-b) + 22px);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--ink);
      background: rgba(6,6,7,0.6); padding: 5px 10px; border-radius: 2px;
    }
    .rv-before-label { left: calc(var(--safe-l) + var(--edge)); }
    .rv-after-label  { right: calc(var(--safe-r) + var(--edge)); color: var(--red); }

    /* ── Doc sheet: quoted-line critique for uploaded copy/scripts ── */
    #docsheet {
      position: fixed; z-index: 18;
      left: calc(var(--safe-l) + var(--edge));
      top: calc(var(--safe-t) + 96px);
      width: min(420px, 78vw);
      max-height: 55vh; overflow-y: auto;
      display: none; flex-direction: column; gap: 14px;
      pointer-events: none;
    }
    body.doc-mode #docsheet { display: flex; }
    .doc-title {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--zinc);
      padding-bottom: 6px; border-bottom: 1px solid var(--hair);
    }
    .doc-issue { opacity: 0; transform: translateY(6px); transition: opacity 400ms ease, transform 400ms ease; }
    .doc-issue.in { opacity: 1; transform: none; }
    .doc-issue .di-label {
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--red);
    }
    .doc-issue .di-quote {
      font-family: var(--serif); font-style: italic;
      font-size: 16px; line-height: 1.45; color: var(--ink);
      margin-top: 3px;
    }
    .doc-issue .di-detail {
      font-family: var(--sans); font-size: 12.5px; line-height: 1.5;
      color: var(--ink-soft); margin-top: 3px;
    }
    .doc-issue[dir="rtl"] { text-align: right; }

    /* ── Voice bars: her speech, made visible ───────────────────── */
    #voicebars { display: inline-flex; gap: 2px; align-items: center; height: 14px; margin-left: 2px; opacity: 0; transition: opacity 250ms ease; }
    body.voice-on #voicebars { opacity: 1; }
    #voicebars i {
      width: 2px; height: 3px; background: var(--red); border-radius: 1px;
      box-shadow: 0 0 4px var(--red-glow);
      transition: height 90ms ease;
    }

    /* ── Home button (bottom-left) ───────────────────────────────── */
    #btn-home {
      position: fixed; z-index: 22;
      left: calc(var(--safe-l) + var(--edge));
      bottom: calc(var(--safe-b) + 26px);
      min-width: 48px; padding: 0 14px; font-size: 16px;
    }
    body.state-idle #btn-home { display: none; }

    /* ── Camera flip (bottom-right). Opening is FRONT camera — she
       faces the person. Turning her to the work/screen is a separate,
       deliberate act (Yosef 22.7). Hidden when no live camera. ─────── */
    #btn-flip {
      position: fixed; z-index: 22;
      right: calc(var(--safe-r) + var(--edge));
      bottom: calc(var(--safe-b) + 26px);
      min-width: 48px; padding: 0 14px; font-size: 16px;
    }
    body.state-idle #btn-flip, body.uploaded #btn-flip,
    body.doc-mode #btn-flip { display: none; }

    /* front camera preview is mirrored, like every selfie view */
    body.front-cam #video { transform: scaleX(-1); }

    /* ── Back-to-critique inside the reveal ──────────────────────── */
    #btn-back-live {
      position: absolute; z-index: 5;
      left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 22px);
    }

    /* ── Notice: visible failure line (iron rule: no silent errors) ── */
    #notice {
      position: fixed; z-index: 23;
      left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 148px);
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--red);
      background: rgba(6,6,7,0.7); padding: 6px 12px; border-radius: 2px;
      opacity: 0; pointer-events: none;
      transition: opacity 300ms ease;
    }
    #notice.visible { opacity: 1; }

    /* ── Idle hint ───────────────────────────────────────────────── */
    #hint {
      position: fixed; z-index: 17; left: 50%; transform: translateX(-50%);
      bottom: calc(var(--safe-b) + 148px);
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--zinc-dim);
      transition: opacity 400ms ease;
    }
    body:not(.state-idle) #hint { opacity: 0; }

    /* offscreen capture canvas */
    #cap { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; left: -9999px; }

    @media (prefers-reduced-motion: reduce) {
      #video { transition: none; }
      #ring { animation: none !important; }
    }
  </style>
</head>

<body class="state-idle" data-mode="print">
  <div id="stage">
    <video id="video" playsinline muted autoplay></video>
    <img id="upload-img" alt="Uploaded work" />
    <div id="marks"></div>
    <div id="ring">
      <div class="ring-rot">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="47" />
          <circle class="ring-sweep" cx="50" cy="50" r="47" />
          <g class="ring-ticks">
            <line x1="50" y1="1" x2="50" y2="6" />
            <line x1="50" y1="94" x2="50" y2="99" />
            <line x1="1" y1="50" x2="6" y2="50" />
            <line x1="94" y1="50" x2="99" y2="50" />
          </g>
        </svg>
      </div>
      <span class="bracket bk-tl"></span>
      <span class="bracket bk-tr"></span>
      <span class="bracket bk-bl"></span>
      <span class="bracket bk-br"></span>
    </div>
  </div>

  <header id="placard">
    <div class="wordmark">MiniX</div>
    <div class="medium">live critique &middot; <span id="medium-mode">print</span></div>
  </header>

  <div id="status">
    <span id="voicebars" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
    <span id="live-dot"></span>
    <span id="status-text">ready</span>
  </div>

  <button id="btn-home" class="btn btn-ghost" aria-label="Home">⌂</button>
  <button id="btn-flip" class="btn btn-ghost" aria-label="Flip camera">⇄</button>

  <div id="verdict" aria-hidden="true">
    <div class="score"><span id="score">—</span><span class="over">/10</span></div>
    <div id="worst"></div>
  </div>

  <nav id="modes" aria-label="Critique mode">
    <button data-mode="ui" aria-pressed="false">UI</button>
    <button data-mode="print" aria-pressed="true">Print</button>
    <button data-mode="art" aria-pressed="false">Art</button>
  </nav>

  <div id="subtitles"><span id="subtitle-text"></span></div>

  <div id="hint">Point at the work &middot; Scan &mdash; or Upload a print / campaign</div>

  <div id="notice" role="status"></div>

  <div id="actions">
    <button id="btn-scan" class="btn btn-primary">Scan</button>
    <button id="btn-upload" class="btn btn-ghost">Upload</button>
    <button id="btn-rebuild" class="btn" hidden>Rebuild</button>
    <button id="btn-reset" class="btn btn-ghost" hidden>New</button>
  </div>
  <input type="file" id="file-in" accept="image/*,application/pdf,.pdf,.docx" hidden />

  <div id="docsheet" aria-live="polite"></div>

  <div id="reveal">
    <div class="rv-pane" id="rv-after"><img id="after-img" alt="Redesigned work" /></div>
    <div class="rv-pane" id="rv-before"><img id="before-img" alt="Original work" /></div>
    <div id="rv-handle"></div>
    <div class="rv-label rv-before-label">Before</div>
    <div class="rv-label rv-after-label">After</div>
    <button id="btn-back-live" class="btn">Back to critique</button>
  </div>

  <canvas id="cap"></canvas>

  <script src="app.js"></script>
</body>

</html>
